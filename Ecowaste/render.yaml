services:
  # 1. PocketBase Database Service
  - type: web
    name: ecowaste-pocketbase
    env: docker
    plan: free
    rootDir: Ecowaste/backend-pb
    dockerfilePath: Dockerfile

  # 2. Node.js Express Server
  - type: web
    name: ecowaste-node
    env: node
    plan: free
    rootDir: Ecowaste
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
